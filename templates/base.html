<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Олимпиада{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --card: #1a1a24;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --text: #e8e8ed;
      --muted: #8888a0;
      --danger: #ff6b6b;
      --border: #2a2a38;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1, h2 { font-family: 'Unbounded', sans-serif; font-weight: 600; }
    h1 { font-size: 1.75rem; margin-bottom: 1rem; }
    h2 { font-size: 1.25rem; margin-bottom: 0.75rem; color: var(--accent); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    input[type="text"],
    input[type="email"],
    select,
    button {
      font-family: inherit;
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: var(--accent-dim); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: var(--danger); margin-top: 0.5rem; font-size: 0.9rem; }
    .muted { color: var(--muted); font-size: 0.9rem; }
  </style>
  {% block extra_css %}{% endblock %}
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
