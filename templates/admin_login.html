{% extends "base.html" %}
{% block title %}Вход для администратора{% endblock %}
{% block content %}
  <div class="card">
    <h1>Вход для администратора</h1>
    <p class="muted" style="margin-bottom: 1rem;">Введите пароль для доступа к результатам олимпиады.</p>
    <form method="post" action="{{ url_for('admin_login') }}">
      <label>Пароль</label>
      <input type="password" name="password" required placeholder="Пароль" autocomplete="current-password">
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <button type="submit" style="margin-top: 0.5rem;">Войти</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{{ url_for('index') }}">← На главную</a></p>
  </div>
{% endblock %}
